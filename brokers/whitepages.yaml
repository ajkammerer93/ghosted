name: "Whitepages"
url: "https://www.whitepages.com"
opt_out_url: "https://www.whitepages.com/suppression-requests"
method: "web_form"
parent_company: null
captcha: null
requires_email_verification: false
recommended_rescan_days: 60
search:
  url: "https://www.whitepages.com/name/{{user.first_name}}-{{user.last_name}}/{{user.city}}-{{user.state}}"
  result_selector: ".serp-card"
  name_selector: ".serp-card-name"
  no_results_indicator: "We couldn't find"
opt_out_steps:
  - action: navigate
    url: "https://www.whitepages.com/name/{{user.first_name}}-{{user.last_name}}/{{user.city}}-{{user.state}}"
  - action: click
    selector: ".serp-card a"
  - action: wait_seconds
    wait_seconds: 2
  - action: capture_url
    type: "profile_url"
  - action: navigate
    url: "https://www.whitepages.com/suppression-requests"
  - action: fill
    selector: "input[name='listing_url']"
    value: "{{profile_url}}"
  - action: click
    selector: "button[type='submit']"
  - action: wait_seconds
    wait_seconds: 5
  - action: manual_step
    value: "Answer the phone verification call from Whitepages. Enter the verification code shown on screen when prompted."
notes: "Requires phone verification via automated call. Removal processed within 24 hours."
