name: "Whitepages"
url: "https://www.whitepages.com"
opt_out_url: "https://www.whitepages.com/suppression-requests"
method: "web_form"
parent_company: null
captcha: null
requires_email_verification: false
recommended_rescan_days: 60
search:
  url: "https://www.whitepages.com/name/{{user.first_name}}-{{user.last_name}}/{{user.city}}-{{user.state}}"
  result_selector: ".serp-card"
  name_selector: ".serp-card-name"
  no_results_indicator: "We couldn't find"
opt_out_steps:
  - action: navigate
    url: "https://www.whitepages.com/suppression-requests"
  - action: wait_seconds
    wait_seconds: 3
  - action: dismiss_dialogs
  - action: manual_step
    value: "Go to https://www.whitepages.com/suppression-requests and paste this profile URL into the form: {{profile_url}} — then click Next, select a removal reason, and complete the phone verification call."
notes: "Requires phone verification via automated call — cannot be fully automated. Profile URL is captured during scan and passed to removal. Removal processed within 24 hours. Can also email support@whitepages.com with profile URL."
