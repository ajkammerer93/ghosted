name: "VeriPages"
url: "https://veripages.com"
opt_out_url: "https://veripages.com/inner/removal-service"
method: "web_form"
parent_company: null
captcha: null
requires_email_verification: true
recommended_rescan_days: 60
search:
  url: "https://veripages.com/people/{{user.first_name}}-{{user.last_name}}/{{user.city}}-{{user.state}}"
  result_selector: ".people-card"
  name_selector: ".people-card .name"
  no_results_indicator: "No results found"
opt_out_steps:
  - action: navigate
    url: "https://veripages.com/people/{{user.first_name}}-{{user.last_name}}/{{user.city}}-{{user.state}}"
  - action: click
    selector: ".people-card a.view-profile"
  - action: wait_seconds
    wait_seconds: 2
  - action: click
    selector: "a.control-profile-btn"
  - action: fill
    selector: "input[name='email']"
    value: "{{user.opt_out_email}}"
  - action: click
    selector: "button[type='submit']"
  - action: await_email
    subject_pattern: "VeriPages.*removal|opt.out"
    timeout_minutes: 30
  - action: click_email_link
    link_pattern: "veripages.com/.*removal/confirm"
notes: "Can also email removal@veripages.com with profile URL. Removal takes up to 48 hours."
