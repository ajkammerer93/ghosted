name: "PeopleFinder"
url: "https://www.peoplefinder.com"
opt_out_url: "https://www.peoplefinder.com/optout"
method: "web_form"
parent_company: null
captcha: "recaptcha_v2"
requires_email_verification: false
recommended_rescan_days: 60
search:
  url: "https://www.peoplefinder.com/results.php?name={{user.first_name}}+{{user.last_name}}&city={{user.city}}&state={{user.state}}"
  result_selector: ".record-result"
  name_selector: ".record-result .name"
  no_results_indicator: "No records found"
opt_out_steps:
  - action: navigate
    url: "https://www.peoplefinder.com/optout"
  - action: click
    selector: "a#public-record-removal"
  - action: wait_seconds
    wait_seconds: 2
  - action: fill
    selector: "input[name='firstName']"
    value: "{{user.first_name}}"
  - action: fill
    selector: "input[name='lastName']"
    value: "{{user.last_name}}"
  - action: fill
    selector: "input[name='email']"
    value: "{{user.opt_out_email}}"
  - action: solve_captcha
    type: "recaptcha_v2"
  - action: click
    selector: "button[type='submit']"
notes: "URL submission pattern. Use disposable email. Processing takes up to 9 days but usually 24-48 hours. Can also call (800) 718-8997."
