name: "ThatsThem"
url: "https://thatsthem.com"
opt_out_url: "https://thatsthem.com/optout"
method: "web_form"
parent_company: null
captcha: "custom"
requires_email_verification: false
recommended_rescan_days: 60
search:
  url: "https://thatsthem.com/name/{{user.first_name}}-{{user.last_name}}/{{user.city}}-{{user.state}}"
  result_selector: "div.record[id^='r']"
  name_selector: "div.record[id^='r'] a[href*='/name/']"
  no_results_indicator: "Sorry, we couldn't find"
opt_out_steps:
  - action: navigate
    url: "https://thatsthem.com/optout"
  - action: fill
    selector: "input[name='first_name']"
    value: "{{user.first_name}}"
  - action: fill
    selector: "input[name='last_name']"
    value: "{{user.last_name}}"
  - action: fill
    selector: "input[name='email']"
    value: "{{user.opt_out_email}}"
  - action: fill
    selector: "input[name='street_address']"
    value: "{{user.city}}, {{user.state}}"
  - action: fill
    selector: "input[name='state']"
    value: "{{user.state}}"
  - action: fill
    selector: "input[name='city']"
    value: "{{user.city}}"
  - action: fill
    selector: "input[name='phone']"
    value: "{{user.phone}}"
  - action: solve_captcha
    type: "custom"
  - action: click
    selector: "button[type='submit']"
notes: "CAPTCHA wall on search page causes navigation timeout (custom 'Quick Humanity Check'). In headed mode, CAPTCHA auto-solves and page loads. Results use div.record with sequential ids (r0, r1, etc.) containing .card wrappers. Name links follow /name/First-Last pattern. Opt-out flow: fill name/email/address fields + custom CAPTCHA + submit. Processing takes 7-14 business days. Alternative: email optout@thatsthem.com."
