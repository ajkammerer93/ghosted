name: "SearchPeopleFree"
url: "https://www.searchpeoplefree.com"
opt_out_url: "https://www.searchpeoplefree.com/opt-out"
method: "web_form"
parent_company: null
captcha: "recaptcha_v2"
requires_email_verification: true
recommended_rescan_days: 30
search:
  url: "https://www.searchpeoplefree.com/find/{{user.first_name}}-{{user.last_name}}/{{user.state}}"
  result_selector: ".result-card"
  name_selector: ".result-card .name-link"
  no_results_indicator: "No results found"
opt_out_steps:
  - action: navigate
    url: "https://www.searchpeoplefree.com/opt-out"
  - action: fill
    selector: "input[name='email']"
    value: "{{user.opt_out_email}}"
  - action: click
    selector: "input[type='checkbox'][name='terms']"
  - action: solve_captcha
    type: "recaptcha_v2"
  - action: click
    selector: "button#begin-removal"
  - action: await_email
    subject_pattern: "SearchPeopleFree.*removal|opt.out"
    timeout_minutes: 30
  - action: click_email_link
    link_pattern: "searchpeoplefree.com/opt-out/confirm"
  - action: fill
    selector: "input[name='firstName']"
    value: "{{user.first_name}}"
  - action: fill
    selector: "input[name='lastName']"
    value: "{{user.last_name}}"
  - action: click
    selector: "button[type='submit']"
notes: "Requires email confirmation before accessing removal form. Record removed within 72 hours."
