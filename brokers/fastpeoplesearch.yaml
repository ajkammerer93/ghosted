name: "FastPeopleSearch"
url: "https://www.fastpeoplesearch.com"
opt_out_url: "https://www.fastpeoplesearch.com/removal"
method: "web_form"
parent_company: null
captcha: "recaptcha_v2"
requires_email_verification: true
recommended_rescan_days: 30
search:
  url: "https://www.fastpeoplesearch.com/name/{{user.first_name}}-{{user.last_name}}_{{user.city}}-{{user.state}}"
  result_selector: "div.card.card-block"
  name_selector: "div.card.card-block .card-title a"
  no_results_indicator: "did not return any results"
opt_out_steps:
  - action: navigate
    url: "https://www.fastpeoplesearch.com/removal"
  - action: fill
    selector: "input[name='email']"
    value: "{{user.opt_out_email}}"
  - action: click
    selector: "input[type='checkbox'][name='confirm']"
  - action: fill
    selector: "input[name='firstName']"
    value: "{{user.first_name}}"
  - action: fill
    selector: "input[name='lastName']"
    value: "{{user.last_name}}"
  - action: fill
    selector: "input[name='city']"
    value: "{{user.city}}"
  - action: select
    selector: "select[name='state']"
    value: "{{user.state}}"
  - action: solve_captcha
    type: "recaptcha_v2"
  - action: click
    selector: "button[type='submit']"
  - action: wait_seconds
    wait_seconds: 3
  - action: click
    selector: "a.remove-record-link"
  - action: await_email
    subject_pattern: "FastPeopleSearch Removal"
    timeout_minutes: 30
  - action: click_email_link
    link_pattern: "fastpeoplesearch.com/removal/confirm"
notes: "Cloudflare protected, geofenced to US IPs only. JS-rendered — requires full browser rendering (networkidle). WebFetch blocked by Cloudflare. Profile page selectors confirmed from scrape.do: h1#details-header for name+location, h2#age-header for age, div#current_address_section for address (use stripped_strings/next() for street). Person JSON-LD in script[type='application/ld+json'] has telephone array, homeLocation, postalCode. Emails in FAQPage JSON-LD block (bypasses Cloudflare XOR obfuscation). Search results listing uses Bootstrap-style cards (div.card.card-block / .card-title a) — must verify with live Playwright session from US IP. Limit of 5 opt-out requests per email. Data may reappear. Processing takes up to 72 hours."
