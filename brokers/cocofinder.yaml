name: "CocoFinder"
url: "https://www.cocofinder.com"
opt_out_url: "https://www.cocofinder.com/remove-my-info"
method: "web_form"
cloudflare: true
parent_company: null
captcha: null
requires_email_verification: true
recommended_rescan_days: 30
search:
  url: "https://www.cocofinder.com/people-search?firstName={{user.first_name}}&lastName={{user.last_name}}&city={{user.city}}&state={{user.state}}"
  result_selector: ".search-result-card"
  name_selector: ".search-result-card .name"
  no_results_indicator: "No results found"
opt_out_steps:
  - action: navigate
    url: "https://www.cocofinder.com/remove-my-info"
  - action: fill
    selector: "input[name='firstName']"
    value: "{{user.first_name}}"
  - action: fill
    selector: "input[name='lastName']"
    value: "{{user.last_name}}"
  - action: fill
    selector: "input[name='city']"
    value: "{{user.city}}"
  - action: select
    selector: "select[name='state']"
    value: "{{user.state}}"
  - action: fill
    selector: "input[name='email']"
    value: "{{user.opt_out_email}}"
  - action: click
    selector: "button[type='submit']"
  - action: await_email
    subject_pattern: "CocoFinder.*removal|opt.out"
    timeout_minutes: 30
  - action: click_email_link
    link_pattern: "cocofinder.com/.*confirm"
notes: "Removal form at /remove-my-info. Email verification required. Processing time varies."
