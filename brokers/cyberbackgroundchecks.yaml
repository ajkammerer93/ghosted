name: "CyberBackgroundChecks"
url: "https://www.cyberbackgroundchecks.com"
opt_out_url: "https://www.cyberbackgroundchecks.com/removal"
method: "web_form"
parent_company: null
captcha: "recaptcha_v2"
requires_email_verification: true
recommended_rescan_days: 60
search:
  url: "https://www.cyberbackgroundchecks.com/people/{{user.first_name}}-{{user.last_name}}/{{user.state}}/{{user.city}}"
  result_selector: ".record-card"
  name_selector: ".record-card .name"
  no_results_indicator: "No results found"
opt_out_steps:
  - action: navigate
    url: "https://www.cyberbackgroundchecks.com/removal"
  - action: fill
    selector: "input[name='firstName']"
    value: "{{user.first_name}}"
  - action: fill
    selector: "input[name='lastName']"
    value: "{{user.last_name}}"
  - action: fill
    selector: "input[name='email']"
    value: "{{user.opt_out_email}}"
  - action: click
    selector: "input[type='checkbox'][name='terms']"
  - action: solve_captcha
    type: "recaptcha_v2"
  - action: click
    selector: "button[type='submit']"
  - action: await_email
    subject_pattern: "CyberBackgroundChecks.*removal|confirm"
    timeout_minutes: 30
  - action: click_email_link
    link_pattern: "cyberbackgroundchecks.com/removal/confirm"
notes: "Confirmation link valid for 24 hours only. Also has CCPA-specific page at /ccparemoval for California residents. Removal takes up to 3 days."
