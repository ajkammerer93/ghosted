name: "USPhoneBook"
url: "https://www.usphonebook.com"
opt_out_url: "https://www.usphonebook.com/opt-out"
method: "web_form"
parent_company: null
captcha: "recaptcha_v2"
requires_email_verification: true
recommended_rescan_days: 30
search:
  url: "https://www.usphonebook.com/{{user.first_name}}-{{user.last_name}}/{{user.state}}"
  result_selector: ".result-list .card"
  name_selector: ".card .name"
  no_results_indicator: "No results found"
opt_out_steps:
  - action: navigate
    url: "https://www.usphonebook.com/opt-out"
  - action: fill
    selector: "input[name='email']"
    value: "{{user.opt_out_email}}"
  - action: click
    selector: "input[type='checkbox']"
  - action: click
    selector: "input[type='checkbox']:nth-of-type(2)"
  - action: click
    selector: "button[type='submit']"
  - action: wait_seconds
    wait_seconds: 3
  - action: fill
    selector: "input[name='phone']"
    value: "{{user.phone}}"
  - action: click
    selector: "button:has-text('GET DETAILS FOR')"
  - action: wait_seconds
    wait_seconds: 3
  - action: click
    selector: "button:has-text('Remove Record')"
  - action: await_email
    subject_pattern: "USPhoneBook.*opt.out|removal"
    timeout_minutes: 30
  - action: click_email_link
    link_pattern: "usphonebook.com/opt-out/confirm"
notes: "Completely blocked from WebFetch (bot protection). Opt-out flow per Optery/security.org guides: enter email + check two agreement boxes → submit → search for your listing → 'GET DETAILS FOR' button (previously labeled 'VIEW FULL ADDRESS & PHONE') → orange 'Remove Record' button → confirmation email (link expires in 24 hours). Processing within 72 hours. USPhoneBook maintains internal suppression list. Alternative opt-out URLs: /opt-out (confirmed) and /removal (per Optery). Search selectors (.result-list .card) unverifiable via WebFetch. Data may reappear as databases refresh. Can also call (888) 747-4095. Must verify all selectors with live Playwright session from US IP."
