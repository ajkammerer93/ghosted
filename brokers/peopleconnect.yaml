name: "PeopleConnect"
url: "https://www.peopleconnect.us"
opt_out_url: "https://suppression.peopleconnect.us"
method: "suppression_portal"
parent_company: "PeopleConnect, Inc."
captcha: null
requires_email_verification: true
recommended_rescan_days: 180
search:
  url: "https://www.intelius.com/people-search/{{user.first_name}}-{{user.last_name}}/{{user.state}}"
  result_selector: ".record-card"
  name_selector: ".record-card-name"
  no_results_indicator: "No results found"
opt_out_steps:
  - action: navigate
    url: "https://suppression.peopleconnect.us"
  - action: fill
    selector: "input[name='email']"
    value: "{{user.opt_out_email}}"
  - action: click
    selector: "input[type='checkbox']"
  - action: click
    selector: "button:has-text('Continue')"
  - action: await_email
    subject_pattern: "PeopleConnect.*[Vv]erif"
    timeout_minutes: 30
  - action: click_email_link
    link_pattern: "suppression.peopleconnect.us"
  - action: fill
    selector: "input[name='dateOfBirth']"
    value: "{{user.date_of_birth}}"
  - action: click
    selector: "input[type='checkbox']"
  - action: click
    selector: "button:has-text('Continue')"
  - action: fill
    selector: "input[name='firstName']"
    value: "{{user.first_name}}"
  - action: fill
    selector: "input[name='lastName']"
    value: "{{user.last_name}}"
  - action: click
    selector: "input[type='checkbox']"
  - action: click
    selector: "button:has-text('Continue')"
  - action: select
    selector: "select[name='desired_behavior']"
    value: "Suppressed"
  - action: click
    selector: "button:has-text('Save')"
notes: "Covers Intelius, TruthFinder, InstantCheckmate, US Search, Classmates.com, ZabaSearch, AnyWho, Addresses.com, PublicRecords.com, PeopleLookup, iSearch, PeopleFinder, AddressSearch.com. Suppression portal is Cloudflare-protected. Opt-out flow confirmed via Optery guide: email → verify email → DOB → legal name → select 'Suppressed' → Save. Each step has a checkbox + Continue button. Suppression takes up to 10 business days. Search uses Intelius which has heavy bot protection (not just Cloudflare) — 404/403 expected from automated requests. Must verify all selectors with live Playwright session from US IP."
