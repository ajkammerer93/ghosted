name: "Spokeo"
url: "https://www.spokeo.com"
opt_out_url: "https://www.spokeo.com/optout"
method: "web_form"
parent_company: null
captcha: "recaptcha_v2"
requires_email_verification: true
recommended_rescan_days: 30
search:
  url: "https://www.spokeo.com/search?q={{user.first_name}}+{{user.last_name}}&l={{user.city}},+{{user.state}}"
  result_selector: ".result-item"
  name_selector: ".full-name"
  no_results_indicator: "No results found"
opt_out_steps:
  - action: navigate
    url: "https://www.spokeo.com/search?q={{user.first_name}}+{{user.last_name}}&l={{user.city}},+{{user.state}}"
  - action: click
    selector: ".result-item a"
  - action: wait_seconds
    wait_seconds: 2
  - action: capture_url
    type: "profile_url"
  - action: navigate
    url: "https://www.spokeo.com/optout"
  - action: fill
    selector: "input#url-input"
    value: "{{profile_url}}"
  - action: fill
    selector: "input#email-input"
    value: "{{user.opt_out_email}}"
  - action: solve_captcha
    type: "recaptcha_v2"
  - action: click
    selector: "button#opt-out-submit"
  - action: await_email
    subject_pattern: "Spokeo Directory Removal Confirmation"
    timeout_minutes: 30
  - action: click_email_link
    link_pattern: "spokeo.com/optout/confirm"
notes: "Each listing (phone, email, name variation) requires a separate opt-out. Processing takes 24-48 hours."
